<!DOCTYPE html>
<!--
  Proyecto: SmartBudget
  Página: Configuración de cuenta y notificaciones
  Corresponde a la función 10, Notificaciones por correo
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget | Configuración</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="topbar">
        <div class="marca">
            <img src="img/logo.png" alt="Logotipo de SmartBudget" class="logo-small">
            <span>SmartBudget</span>
        </div>

        <nav class="menu-principal" aria-label="Navegación principal">
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="ingresos.html">Ingresos</a></li>
                <li><a href="gastos.html">Gastos</a></li>
                <li><a href="reportes.html">Reportes</a></li>
                <li><a href="metas.html">Metas de ahorro</a></li>
                <li><a href="configuracion.html" class="activo">Configuración</a></li>
            </ul>
        </nav>

        <div class="usuario-sesion">
            <span id="nombre-usuario">Hola, Usuario</span>
            <a href="index.html" class="btn-salir">Cerrar sesión</a>
        </div>
    </header>

    <main class="contenido">

        <h1>Configuración</h1>

        <section class="tarjeta-formulario">
            <h2>Notificaciones por correo</h2>

            <!-- El "action" apunta al futuro controlador PHP de configuración -->
            <form id="form-notificaciones" method="POST" action="controllers/ConfiguracionController.php">

                <div class="campo campo-switch">
                    <label for="notif-reporte">Reporte financiero mensual</label>
                    <input type="checkbox" id="notif-reporte" name="notif_reporte">
                </div>

                <div class="campo campo-switch">
                    <label for="notif-pagos">Alertas de próximos pagos</label>
                    <input type="checkbox" id="notif-pagos" name="notif_pagos">
                </div>

                <div class="campo campo-switch">
                    <label for="notif-exceso">Aviso al sobrepasar el monto máximo de una categoría</label>
                    <input type="checkbox" id="notif-exceso" name="notif_exceso">
                </div>

                <button type="submit" class="btn-primario">Guardar cambios</button>
            </form>
        </section>

        <section class="tarjeta-formulario">
            <h2>Datos de la cuenta</h2>

            <form id="form-perfil" method="POST" action="controllers/ConfiguracionController.php">

                <div class="campo">
                    <label for="nombre-perfil">Nombre completo</label>
                    <input type="text" id="nombre-perfil" name="nombre">
                </div>

                <div class="campo">
                    <label for="email-perfil">Correo electrónico</label>
                    <input type="email" id="email-perfil" name="email">
                </div>

                <button type="submit" class="btn-secundario">Actualizar datos</button>
            </form>
        </section>

    </main>

    <footer class="footer-app">
        <p>&copy; 2026 SmartBudget - Grupo 4</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
